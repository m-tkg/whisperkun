name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # whisperkun は macOS 26 SDK 専用 API（FoundationModels / Speech）を使うため
    # macos-latest（現状 macOS 15）ではビルドできない。Xcode 26 を含む macos-26 を使う。
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          V=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist 2>/dev/null | tr -d ' ')
          if [ -z "$V" ]; then
            echo "CFBundleShortVersionString not found in Resources/Info.plist" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V (tag v$V)"

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.tag }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # 署名用シークレットの有無を判定（未設定なら ad-hoc 署名にフォールバック）。
      - name: Check signing secrets
        id: signing
        if: steps.check.outputs.exists == 'false'
        run: |
          if [ -n "${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::署名証明書のシークレット未設定のため ad-hoc 署名になります。アップデート後に TCC 権限（マイク/音声認識/アクセシビリティ）が無効化されます。docs/SIGNING.md を参照してください。"
          fi

      # 公証用シークレットの有無を判定（未設定なら公証をスキップ）。
      - name: Check notarization secrets
        id: notary
        if: steps.check.outputs.exists == 'false'
        run: |
          if [ -n "${{ secrets.NOTARY_PASSWORD }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::公証用シークレット未設定のため notarization をスキップします（Gatekeeper 警告が残ります）。docs/SIGNING.md を参照してください。"
          fi

      # 署名証明書を一時キーチェーンに取り込む（安定署名でTCC権限をアップデート越しに保持）。
      - name: Import signing certificate
        if: steps.signing.outputs.present == 'true'
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # codesign が見つけられるよう検索リストへ追加
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build Release
        if: steps.check.outputs.exists == 'false'
        env:
          SIGN_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: bash Scripts/bundle.sh release

      # Developer ID 署名済みアプリを公証し、チケットを .app に staple する。
      - name: Notarize and staple
        if: steps.notary.outputs.present == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          # 公証は zip を提出する（.app をそのまま提出できないため）
          ditto -c -k --keepParent Whisperkun.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          # チケットを .app に添付（オフラインでも Gatekeeper を通す）
          xcrun stapler staple Whisperkun.app
          xcrun stapler validate Whisperkun.app

      - name: Create zip
        if: steps.check.outputs.exists == 'false'
        run: zip -ry Whisperkun.zip Whisperkun.app

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            Whisperkun.zip

      - name: Clean up keychain
        if: ${{ always() && steps.signing.outputs.present == 'true' }}
        run: security delete-keychain "$SIGN_KEYCHAIN" || true
